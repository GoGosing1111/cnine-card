<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>씨켓몬 V2 설치</title><link rel="stylesheet" href="/setup/setup.css"></head><body><main><section class="panel"><img src="/assets/ui/cninelogo.png" alt="CNINE"><p class="eyebrow">CNINE CARD V2 INSTALLER</p><h1>씨켓몬 V2 초기 설치</h1><p class="desc">D1 테이블, 멤버, 카드 376장, 카드팩 4종과 최초 최고 관리자 계정을 한 번에 생성합니다.</p><div id="status" class="status">상태 확인 중...</div><label>Cloudflare SETUP_KEY<input id="setupKey" type="password" autocomplete="off" placeholder="Cloudflare 환경 변수와 같은 값"></label><label>최고 관리자 닉네임<input id="nickname" maxlength="20" placeholder="예: 유두위생크림"></label><button id="install">V2 데이터베이스 초기화</button><div id="result"></div><p class="help">이 화면은 최초 1회만 사용됩니다. 초기화 후 같은 버튼을 다시 눌러도 데이터가 재생성되지 않습니다.</p></section></main><script src="/setup/setup.js"></script></body></html>
