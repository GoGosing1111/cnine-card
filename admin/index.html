<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CNINE CARD CMS</title><link rel="stylesheet" href="admin.css"></head><body>
<div class="layout"><aside><div class="logo">CNINE <b>CMS</b></div><nav id="nav"><button data-view="dashboard" class="active">대시보드</button><button data-view="cards">카드관리</button><button data-view="users">유저관리</button><button data-view="coupons">쿠폰관리</button><button data-view="logs">관리자로그</button><button data-view="settings">설정</button></nav><a href="../">게임으로</a><button id="logoutBtn" class="ghost">로그아웃</button></aside>
<main><section id="login" class="login"><h1>관리자 로그인</h1><input id="key" placeholder="관리자 개인키"><button id="loginBtn">로그인</button><p>OWNER와 ADMIN 계정이 접속할 수 있습니다.</p></section>
<section id="cms" hidden><header><div><small>CNINE CARD ADMIN</small><h1 id="pageTitle">대시보드</h1></div><span id="roleBadge"></span></header>
<section class="view" id="view-dashboard"><div id="stats" class="stats"></div></section>
<section class="view" id="view-cards" hidden><div class="bar"><input id="cardSearch" placeholder="카드명·멤버 검색"><select id="grade"><option value="">전체 등급</option><option>SSR</option><option>UR</option><option>HR</option><option>SR</option><option>R</option><option>U</option><option>C</option></select><button id="addCardBtn">카드 추가</button></div><div id="cards" class="cards"></div></section>
<section class="view" id="view-users" hidden><div class="bar"><input id="userSearch" placeholder="닉네임 검색"><button id="userSearchBtn">검색</button></div><div id="users" class="table"></div></section>
<section class="view" id="view-coupons" hidden><div class="panel formgrid"><h2>쿠폰 발급</h2><input id="couponCode" placeholder="쿠폰 코드"><input id="couponReward" type="number" value="1000" min="1" placeholder="보상 코인"><input id="couponMax" type="number" value="100" min="1" placeholder="총 사용 한도"><label>시작<input id="couponStart" type="datetime-local"></label><label>종료<input id="couponEnd" type="datetime-local"></label><button id="createCouponBtn">쿠폰 발급</button></div><div id="coupons" class="table"></div></section>
<section class="view" id="view-logs" hidden><div id="logs" class="table"></div></section>
<section class="view" id="view-settings" hidden><div class="panel formgrid"><h2>기본 설정</h2><label>신규 가입 코인<input id="newUserCoin" type="number" value="5000"></label><label>공지<input id="siteNotice"></label><label>점검 모드<select id="maintenance"><option value="0">사용 안 함</option><option value="1">사용</option></select></label><button id="saveSettingsBtn">저장</button></div></section>
</section></main></div>
<dialog id="cardDialog"><form method="dialog"><h2>카드 추가</h2><select id="memberId"></select><input id="cardTitle" placeholder="카드명"><select id="cardGrade"><option>SSR</option><option>UR</option><option>HR</option><option>SR</option><option>R</option><option>U</option><option selected>C</option></select><input id="cardImage" placeholder="이미지 경로 또는 URL"><div class="two"><input id="cardFx" type="number" value="50"><input id="cardFy" type="number" value="50"></div><button type="button" id="saveCardBtn">저장</button><button value="cancel" class="ghost">취소</button></form></dialog>
<dialog id="userDialog"><form method="dialog"><h2 id="userDialogTitle">유저 관리</h2><input type="hidden" id="selectedUserId"><div id="userDetail"></div><div class="two"><input id="coinAmount" type="number" placeholder="지급 + / 회수 -"><input id="coinReason" value="관리자 조정" placeholder="사유"></div><button type="button" data-action="COIN">코인 지급/회수</button><button type="button" id="resetKeyBtn">개인키 재발급</button><button type="button" data-action="CARDS_RESET" class="warn">카드 초기화</button><button type="button" data-action="ATTENDANCE_RESET" class="warn">출석 초기화</button><button type="button" data-action="ACCOUNT_RESET" class="danger">계정 초기화</button><div class="two"><select id="banDays"><option value="1">1일</option><option value="3">3일</option><option value="7">7일</option><option value="30">30일</option><option value="PERMANENT">영구</option></select><input id="banReason" placeholder="정지 사유"></div><button type="button" data-action="BAN" class="danger">이용정지</button><button type="button" data-action="UNBAN">이용해제</button><button value="cancel" class="ghost">닫기</button></form></dialog>
<script src="admin.js"></script></body></html>
