<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>씨켓몬 카드 관리자</title><link rel="stylesheet" href="admin.css"></head><body><main><header><div><small>CNINE CARD CMS · V2.1</small><h1>카드 관리자</h1><p>카드명·등급·초점·활성 상태를 D1에 즉시 저장합니다.</p></div><div class="header-actions"><a href="../">게임으로</a><button id="logoutBtn" class="secondary-btn">로그아웃</button></div></header><section id="login" class="panel"><h2>관리자 로그인</h2><input id="key" placeholder="관리자 개인키"><button id="loginBtn">로그인</button><p>OWNER, ADMIN 또는 CARD_MANAGER 계정만 사용할 수 있습니다.</p></section><section id="cms" hidden><div class="notice panel"><strong>저장 방식</strong><span>저장 버튼을 누르면 Cloudflare D1에 바로 반영됩니다. 숨김은 기존 유저의 보유 기록을 지우지 않습니다.</span></div><div class="toolbar panel"><input id="search" placeholder="카드명·멤버·카드 ID 검색"><select id="grade"><option value="">전체 등급</option><option>SSR</option><option>UR</option><option>HR</option><option>SR</option><option>R</option><option>U</option><option>C</option></select><select id="statusFilter"><option value="">전체 상태</option><option value="active">사용 중</option><option value="hidden">숨김</option><option value="broken">이미지 없음</option></select><span id="count"></span></div><div id="cards" class="grid"></div></section></main><script src="admin.js"></script></body></html>
